<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Historia</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:radial-gradient(circle at top,#4a1838,#140b14);
color:white;
text-align:center;
}

.screen{display:none;min-height:100vh;justify-content:center;align-items:center;flex-direction:column;padding:20px}
.active{display:flex}

.card{
background:rgba(255,255,255,0.08);
border-radius:30px;
padding:30px;
max-width:400px;
width:100%;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.heart{font-size:30px;margin-bottom:10px}
.eyebrow{letter-spacing:2px;font-size:12px;color:#ffd7e2;margin-bottom:10px}
.names{font-weight:bold;color:#ffd7e2;margin-bottom:10px}

h1{font-size:36px;margin:10px 0}
p{opacity:0.9}

.btn{
background:linear-gradient(45deg,#ff4d8f,#d94dc8);
border:none;
padding:15px 25px;
border-radius:30px;
color:white;
font-size:18px;
margin-top:10px;
}

iframe{
width:100%;
height:300px;
border-radius:20px;
border:none;
}
</style>

</head>
<body>

<div class="screen active" id="s1">
<div class="card">
<div class="heart">❤️</div>
<div class="eyebrow">NUESTRA HISTORIA</div>
<div class="names">Luis y Luisa</div>
<h1>Espera...</h1>
<p>Antes de seguir, quiero que vivas esta sorpresa despacito.</p>
<button class="btn" onclick="next(1)">Descúbrelo</button>
<p style="margin-top:15px;">Pulsa para empezar esta pequeña aventura y descubrir lo que he preparado para ti.</p>
</div>
</div>

<div class="screen" id="s2">
<div class="card">
<h1>El hilo rojo</h1>
<p>Dos personas están unidas por un hilo rojo invisible que nunca se rompe.</p>
<button class="btn" onclick="next(2)">Tira del hilo rojo</button>
</div>
</div>

<div class="screen" id="s3">
<div class="card">
<iframe src="https://www.youtube.com/embed/i9Z4nZiqrEM?playsinline=1&rel=0"></iframe>
<p>Para ti ❤️</p>
</div>
</div>

<script>
function next(n){
document.getElementById("s"+n).classList.remove("active");
document.getElementById("s"+(n+1)).classList.add("active");
}
</script>

</body>
</html>
